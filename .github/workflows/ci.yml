name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-syntax:
    name: Verificação de sintaxe PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Checar sintaxe de todos os arquivos PHP
        run: find . -name "*.php" -not -path "./.git/*" -print0 | xargs -0 -n1 php -l

  docker-build:
    name: Build do Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t sigespro .
